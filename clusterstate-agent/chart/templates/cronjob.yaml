apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "clusterstate-agent.fullname" . }}
  labels:
    {{- include "clusterstate-agent.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "clusterstate-agent.selectorLabels" . | nindent 12 }}
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "clusterstate-agent.serviceAccountName" . }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: OnFailure
          containers:
          - name: clusterstate-agent
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                - ALL
            env:
            - name: SUPPLINE_URL
              value: {{ required "suppline.url is required" .Values.suppline.url | quote }}
            - name: CLUSTER_NAME
              value: {{ required "clusterName is required" .Values.clusterName | quote }}
            - name: EXCLUDED_NAMESPACES
              value: {{ .Values.excludedNamespaces | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            {{- if .Values.suppline.apiKey }}
            - name: SUPPLINE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "clusterstate-agent.fullname" . }}-apikey
                  key: api-key
            {{- end }}
            resources:
              {{- toYaml .Values.resources | nindent 14 }}
