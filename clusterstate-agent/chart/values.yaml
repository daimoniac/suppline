# CronJob schedule (standard cron expression).
# Default: every hour at minute 0.
schedule: "0 * * * *"

# Runtime mode:
# - snapshot: one-shot collection (CronJob)
# - watch: informer-based continuous collection (Deployment)
mode: "snapshot"

# Used in watch mode; how often buffered observations are POSTed.
watchFlushInterval: "30s"

# Used in watch mode Deployment.
replicaCount: 1

# Name of this cluster — sent as the "cluster" field in the inventory payload.
# Required.
clusterName: ""

suppline:
  # Base URL of the suppline API, e.g.:
  #   http://suppline.suppline.svc.cluster.local:8080
  # Required.
  url: ""
  # Optional API key. When set, a Secret is created and the value is injected
  # into the container as SUPPLINE_API_KEY (sent as Authorization: Bearer).
  apiKey: ""

# Comma-separated list of namespaces to exclude from inventory reporting.
# Set to "" to report all namespaces.
excludedNamespaces: "kube-system,kube-public,kube-node-lease"

# Log level: debug | info | warn | error
logLevel: "info"

image:
  repository: ghcr.io/daimoniac/clusterstate-agent
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  # Create ClusterRole + ClusterRoleBinding.
  create: true

# CronJob history retention
failedJobsHistoryLimit: 3
successfulJobsHistoryLimit: 1

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 64Mi
