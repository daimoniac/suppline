<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Container box on top -->
  <rect x="120" y="10" width="160" height="90" rx="12" fill="white" stroke="white" stroke-width="2"/>
  <!-- Container slots -->
  <rect x="135" y="25" width="25" height="60" fill="#0f0f0f"/>
  <rect x="170" y="25" width="25" height="60" fill="#0f0f0f"/>
  <rect x="205" y="25" width="25" height="60" fill="#0f0f0f"/>
  <rect x="240" y="25" width="25" height="60" fill="#0f0f0f"/>
  
  <!-- Left claw -->
  <path d="M 80 100 Q 40 90 30 140 Q 25 165 50 170" fill="white"/>
  
  <!-- Right claw -->
  <path d="M 320 100 Q 360 90 370 140 Q 375 165 350 170" fill="white"/>
  
  <!-- Crab body -->
  <ellipse cx="200" cy="160" rx="90" ry="50" fill="white"/>
  
  <!-- Left eye -->
  <circle cx="170" cy="135" r="12" fill="white"/>
  <!-- Left eye pupil -->
  <circle cx="170" cy="135" r="7" fill="#0f0f0f"/>
  
  <!-- Right eye -->
  <circle cx="230" cy="135" r="12" fill="white"/>
  <!-- Right eye pupil -->
  <circle cx="230" cy="135" r="7" fill="#0f0f0f"/>
  
  <!-- Left front leg -->
  <path d="M 140 180 Q 120 200 110 240" stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
  
  <!-- Right front leg -->
  <path d="M 260 180 Q 280 200 290 240" stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
  
  <!-- Left back leg (curved) -->
  <path d="M 120 175 Q 80 185 70 220" stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
  
  <!-- Right back leg (curved) -->
  <path d="M 280 175 Q 320 185 330 220" stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
  
  <!-- Base line -->
  <line x1="40" y1="260" x2="360" y2="260" stroke="white" stroke-width="14" stroke-linecap="round"/>
</svg>
