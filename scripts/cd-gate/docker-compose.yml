# Local harness for scripts/cd-gate/kyverno-gate.sh. The same script runs in CI;
# see .gitlab-ci.yml. Bind-mount the gate directory so we do not have to rebuild
# an image when the script or policy changes.
#
# Usage (from this directory):
#   export REGISTRY_PASSWORD='...'                 # registry token / PAT
#   # optional: export KYVERNO_IMAGES_FILE="$PWD/images.txt"
#   docker compose run --rm kyverno-apply-test

services:
  kyverno-apply-test:
    image: alpine:3.20
    container_name: kyverno-apply-test
    working_dir: /work
    volumes:
      - ./:/work/gate:ro
      - ${KYVERNO_IMAGES_FILE:-./images.txt}:/work/images.list:ro
    environment:
      REGISTRY_SERVER: ${REGISTRY_SERVER:-docker.io}
      REGISTRY_USERNAME: ${REGISTRY_USERNAME:-hostingmaloonde}
      REGISTRY_PASSWORD: ${REGISTRY_PASSWORD:?set REGISTRY_PASSWORD or PAT}
      REGISTRY_AUTH_HOST: ${REGISTRY_AUTH_HOST:-}
      KYVERNO_VERSION: ${KYVERNO_VERSION:-1.17.1}
      KYVERNO_POLICY_PATH: /work/gate/policy.yaml
      KYVERNO_IMAGES_FILE: /work/images.list
    entrypoint: ["/work/gate/kyverno-gate.sh"]
