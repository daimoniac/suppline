services:
  kyverno-apply-test:
    image: alpine:3.20
    container_name: kyverno-apply-test
    working_dir: /work
    volumes:
      - ./policy.yaml:/work/policy.yaml:ro
    environment:
      IMAGE_UNDER_TEST: ${IMAGE_UNDER_TEST:?set IMAGE_UNDER_TEST, e.g. ghcr.io/acme/app:1.2.3 or ghcr.io/acme/app@sha256:...}
      REGISTRY_SERVER: ${REGISTRY_SERVER:-docker.io}
      REGISTRY_USERNAME: ${REGISTRY_USERNAME:-hostingmaloonde}
      REGISTRY_PASSWORD: ${REGISTRY_PASSWORD:?set REGISTRY_PASSWORD or PAT}
      KYVERNO_VERSION: ${KYVERNO_VERSION:-1.17.1}
    command:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache curl tar ca-certificates docker-cli

        curl -fsSL -o /tmp/kyverno.tar.gz \
          "https://github.com/kyverno/kyverno/releases/download/v$${KYVERNO_VERSION}/kyverno-cli_v$${KYVERNO_VERSION}_linux_x86_64.tar.gz"

        tar -xzf /tmp/kyverno.tar.gz -C /usr/local/bin kyverno
        chmod +x /usr/local/bin/kyverno

        mkdir -p /work /root/.docker

        echo "Logging into registry $${REGISTRY_SERVER}..."
        echo "$${REGISTRY_PASSWORD}" | docker login "$${REGISTRY_SERVER}" \
          --username "$${REGISTRY_USERNAME}" \
          --password-stdin

        cat > /work/resource.yaml <<EOF
        apiVersion: v1
        kind: Pod
        metadata:
          name: image-policy-test
          namespace: local-test
        spec:
          containers:
          - name: app
            image: $${IMAGE_UNDER_TEST}
          restartPolicy: Never
        EOF

        echo "Kyverno version:"
        kyverno version
        echo
        echo "Testing image: $${IMAGE_UNDER_TEST}"
        echo

        set +e
        out=$(kyverno apply /work/policy.yaml \
          --resource /work/resource.yaml \
          --registry \
          --remove-color \
          --detailed-results 2>&1)
        kyverno_ec=$?
        set -e
        printf '%s\n' "$out"
        if printf '%s\n' "$out" | grep -qE 'pass:[[:space:]]*0,[[:space:]]*fail:[[:space:]]*0'; then
          echo "=== Kyverno gate failed: no rule results (pass:0, fail:0) ===" >&2
          echo "Kyverno did not apply any policy outcomes. Check that /work/policy.yaml is mounted and non-empty." >&2
          echo "Image under test: $${IMAGE_UNDER_TEST}" >&2
          exit 1
        fi
        if [ "$kyverno_ec" -ne 0 ]; then
          echo "=== Kyverno gate failed: apply exited $kyverno_ec ===" >&2
          echo "See detailed engine output above (violations, attestation verification, registry auth, etc.)." >&2
          echo "Policy: /work/policy.yaml | Image under test: $${IMAGE_UNDER_TEST}" >&2
          exit "$kyverno_ec"
        fi
        echo
        echo "RESULT: PASS"